</div><script>
function copyCode(btn) {
    let code = btn.nextElementSibling.innerText;

    navigator.clipboard.writeText(code);

    btn.innerText = "Copied ✅";

    setTimeout(() => {
        btn.innerText = "Copy";
    }, 2000);
}
</script></body>
